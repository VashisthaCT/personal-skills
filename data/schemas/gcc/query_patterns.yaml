# Q-pattern library — GCC Metabase
# Source: project_ksa_outage_rca.md memory, Section 4 + 7
# All patterns parameterized: {window_utc_start}, {window_utc_end}, {country_filter}, {endpoint_filter}
# Storage TZ: UTC (verified via Q-tz-final)
# Use these as starting templates for new RCAs — adapt the filter to your incident scope

queries:

  # ---- Sanity checks ----

  Q-tz-final:
    purpose: Verify ClickHouse stores in UTC before any time-windowed query
    database: einvoicing_gcc_analytics
    sql: |
      SELECT now() AS now_raw, toTimeZone(now(), 'UTC') AS now_utc;
    interpretation: now_raw should equal now_utc → confirms UTC storage. If different, every other query needs a TZ shift.

  # ---- Mongo-side (what made it into the DB) ----

  Q12a:
    purpose: Online flow — invoice_status distribution within incident window
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        invoice_status,
        count() AS cnt,
        countDistinct(workspace_id) AS workspaces
      FROM einvoice_gcc
      WHERE created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND created_at <  toDateTime('{window_utc_end}', 'UTC')
      GROUP BY invoice_status
      ORDER BY cnt DESC;
    notes: |
      KSA Apr-27 result: 29,356 REPORTED + 1,836 CLEARED + 3,604 PENDING + 57 FAILED + 24 DISCARDED out of 34,887.
      Use this to anchor "what made it into our DB during the window".

  Q12b:
    purpose: Offline flow — same as Q12a for eInvoice_gcc_metadata
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        invoice_status,
        count() AS cnt,
        countDistinct(workspace_id) AS workspaces
      FROM eInvoice_gcc_metadata
      WHERE created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND created_at <  toDateTime('{window_utc_end}', 'UTC')
      GROUP BY invoice_status
      ORDER BY cnt DESC;
    notes: |
      Always pair with Q12a — never look at one in isolation.
      KSA Apr-27 result: 21,176 REPORTED + 2 PENDING out of 21,178.

  # ---- Customer-side (what HTTP responses customers got) ----

  Q4b:
    purpose: Status × endpoint × ct_error breakdown for HTTP responses
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        analyticsEventName,
        status,
        ctError,
        count() AS attempts,
        countDistinct(uniqueIdentifier) AS distinct_invoices,
        countDistinct(workspaceId)      AS distinct_workspaces
      FROM api_details_v2
      WHERE created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND created_at <  toDateTime('{window_utc_end}', 'UTC')
        AND status >= 200
      GROUP BY analyticsEventName, status, ctError
      ORDER BY analyticsEventName, status DESC;
    notes: |
      The customer-side anchor table — "what did customers actually see?"
      KSA Apr-27: 87,612 total 500s on 45,342 distinct invoices.

  Q7:
    purpose: '"Already approved by ZATCA" retry response count'
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        count() AS retries,
        countDistinct(uniqueIdentifier) AS distinct_invoices,
        countDistinct(workspaceId)      AS distinct_workspaces
      FROM api_details_v2
      WHERE created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND created_at <  toDateTime('{window_utc_end}', 'UTC')
        AND status = 400
        AND lower(message) LIKE '%already approved%';
    notes: |
      Counts customer retries that hit the dedup throw at EinvoiceGccHelper:238 / EInvoiceGccServiceImpl:516.
      KSA Apr-27: 24,159 retries across 24 workspaces — proves customers retried after the silent-success.

  # ---- Cross-table JOIN (the crown jewel) ----

  Q11:
    purpose: Definitive bucket distribution — JOIN api_details_v2 to audit-trail to classify each 500
    database: einvoicing_gcc_analytics
    sql: |
      WITH latest_audit AS (
        SELECT
          uniqueIdentifier,
          argMax(invoice_status, created_at) AS terminal_status,
          max(created_at) AS audit_ts
        FROM eInvoiceAuditTrail
        WHERE created_at >= toDateTime('{window_utc_start}', 'UTC')
          AND created_at <  toDateTime('{window_utc_end_plus_buffer}', 'UTC')
        GROUP BY uniqueIdentifier
      )
      SELECT
        coalesce(a.terminal_status, 'no_state_recorded') AS bucket,
        countDistinct(api.uniqueIdentifier)              AS distinct_invoices,
        countDistinct(api.workspaceId)                   AS workspaces,
        avg(api.timeTaken)                               AS avg_ms,
        max(api.timeTaken)                               AS max_ms
      FROM api_details_v2 api
      LEFT JOIN latest_audit a USING (uniqueIdentifier)
      WHERE api.created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND api.created_at <  toDateTime('{window_utc_end}', 'UTC')
        AND api.status = 500
      GROUP BY bucket
      ORDER BY distinct_invoices DESC;
    notes: |
      THIS IS THE QUERY for the Impact section of any RCA.
      KSA Apr-27 buckets:
        REPORTED (silent success B2C):   25,059 invoices × 77 workspaces
        CLEARED (silent success B2B):       867 invoices × 46 workspaces
        PENDING (uncertain):              5,397 invoices ×  4 workspaces
        no_state_recorded (died early):  14,627 invoices × 57 workspaces
        NOT_SUBMITTED:                    3,689 invoices × 12 workspaces
        FAILED:                             420 invoices × 21 workspaces

  # ---- Top workspaces ----

  Q6a:
    purpose: Per-workspace silent-success counts (online flow, gstin keyed)
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        api.gstin,
        countDistinct(api.uniqueIdentifier) AS silent_success
      FROM api_details_v2 api
      INNER JOIN einvoice_gcc inv USING (uniqueIdentifier)
      WHERE api.created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND api.created_at <  toDateTime('{window_utc_end}', 'UTC')
        AND api.status = 500
        AND inv.invoice_status IN ('REPORTED', 'CLEARED')
      GROUP BY api.gstin
      ORDER BY silent_success DESC
      LIMIT 20;
    notes: |
      Top-10 KSA Apr-27: 300063326300003 (7,523), 310451897400003 (6,921), 310469407100003 (5,646), …
      Use the gstin → workspace_name lookup in einvoices_gcc.gstins or workspaces before customer outreach.

  Q6b:
    purpose: Per-workspace silent-success counts (offline flow, taxpayerOrgId UUID keyed)
    database: einvoicing_gcc_analytics
    sql: |
      SELECT
        meta.taxpayerOrgId,
        countDistinct(meta.uniqueIdentifier) AS silent_success
      FROM api_details_v2 api
      INNER JOIN eInvoice_gcc_metadata meta USING (uniqueIdentifier)
      WHERE api.created_at >= toDateTime('{window_utc_start}', 'UTC')
        AND api.created_at <  toDateTime('{window_utc_end}', 'UTC')
        AND api.status = 500
        AND meta.invoice_status = 'REPORTED'
      GROUP BY meta.taxpayerOrgId
      ORDER BY silent_success DESC
      LIMIT 20;
    notes: |
      Q6a uses gstin (15-digit), Q6b uses UUID — same workspace can appear under different keys.
      ALWAYS unify via einvoices_gcc.gstins.gstin ↔ workspace_id before reporting numbers to humans.
      KSA Apr-27 worst-hit: bb26a2ef-7b79-4374-847e-4e6a9c14803f = 100% of 3,048 invoices silent-success.

# ---- Parameter cheat sheet ----
# {window_utc_start}      ISO 8601, UTC, e.g. '2026-04-27 14:21:00'
# {window_utc_end}        ISO 8601, UTC, e.g. '2026-04-27 15:19:00'
# {window_utc_end_plus_buffer}  end + 10 min — audit trails settle slightly after HTTP response
# {country_filter}        optional: AND region = 'KSA' / 'UAE' / etc. (column varies by table)
# {endpoint_filter}       optional: AND analyticsEventName = '_response_final' (or other enum)
