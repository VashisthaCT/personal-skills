# Per-country invoicing context. Stub status: rich = full runbook seeded; stub = 1-page placeholder.
#
# Schema:
#   countries.<cc>:
#     code: ISO 2-letter code (uppercase)
#     region: MEA | SEA-IND | SEA | EU
#     status: dev | dev-complete | live | accreditation-track
#     regulator: <name>
#     portal: <URL>
#     api: <URL>
#     repos: [list of code-repo dirs in ~/Desktop/]
#     config_repos: [list of deploy/config repo dirs — cloud-init, ct-app-config, etc.]
#     vault_path: <Vault path prefix for env-var overrides; null if unknown>
#     runbook: <relative path to runbook dir>
#     seed: rich | medium | stub
#     consultant: <optional>
#     ...
#
# config_repos and vault_path power /v-country-brain Step 3.5 — config-drift enumeration.
# Without these, the skill can only check YAML defaults, not the actual prod env-var override.

countries:
  jordan:
    code: JO
    region: MEA
    status: dev-complete
    regulator: ISTD (Jordan)
    portal: https://portal.jofotara.gov.jo/en
    api: https://backend.jofotara.gov.jo/core/invoices/
    repos: [einvoicing-core/einvoice-jo, clear-routing/clear-jofotara, clear-sales/einvoice-global]
    config_repos: [cloud-init, ct-app-config]  # TODO confirm vault_path for JO
    vault_path: null
    runbook: runbooks/countries/jordan/
    seed: rich
    consultant: Avtax
    go_live_target: 2026-05-15
    client: MAF (Majid Al Futtaim)
    epic: NV-263

  india:
    code: IN
    region: SEA-IND
    status: live
    regulator: GSTN/NIC/CBIC
    repos: [e-invoicing-be, clr-irp-be, ingestion-overlord]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm
    runbook: runbooks/countries/india/
    seed: rich
    notes: "IRN + EWB; NIC1/NIC2 switcher reverted post-Nov 2025 outage; on-call heavy; FTP migration in progress"

  uae:
    code: AE
    region: MEA
    status: live
    regulator: FTA UAE
    repos: [einvoicing-core/einvoice-ae, clear-routing/clear-ae-fta, pdfgenerator]
    config_repos: [cloud-init, ct-app-config]
    vault_path: secret/einvoicing-core/  # confirmed Apr 2026 — Vault is runtime source of truth for WHOLE_NUMBER_PERCENT_COUNTRY_CODES
    runbook: runbooks/countries/uae/
    seed: rich
    notes: "Tabby B2B/B2C live Dec 16 2025; MEA re-routing live Mar 26 2026; Vault key WHOLE_NUMBER_PERCENT_COUNTRY_CODES must include AE"

  ksa:
    code: SA
    region: MEA
    status: live
    regulator: ZATCA (Saudi Arabia)
    repos: [einvoicing-core, ingestion-overlord]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm
    runbook: runbooks/countries/ksa/
    seed: stub
    notes: "ZATCA SDK 3.4.2/3.4.3 live H1 2025; Sev1 Apr 27 2026 (Redis/licensing)"

  malaysia:
    code: MY
    region: SEA
    status: live
    regulator: LHDN (Malaysia)
    repos: [einvoicing-core/einvoice-my, clear-routing/clear-my-lhdn]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm
    runbook: runbooks/countries/malaysia/
    seed: stub

  belgium:
    code: BE
    region: EU
    status: live
    regulator: FOD Financiën (Belgium)
    repos: [einvoicing-core/einvoice-be, clear-peppol-ap]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm — BE is in WHOLE_NUMBER_PERCENT_COUNTRY_CODES default everywhere
    runbook: runbooks/countries/belgium/
    seed: stub

  france:
    code: FR
    region: EU
    status: accreditation-track
    regulator: PPF (Plateforme Publique de Facturation, France)
    repos: [clear-peppol-ap]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm
    runbook: runbooks/countries/france/
    seed: stub
    notes: "CEO all-hands milestone Apr 24 2026; user tracking, not coding actively"

  poland:
    code: PL
    region: EU
    status: live
    regulator: KSeF (Poland)
    repos: [einvoicing-core/einvoice-pl]
    config_repos: [cloud-init, ct-app-config]
    vault_path: null  # TODO confirm
    runbook: runbooks/countries/poland/
    seed: stub

regions:
  peppol:
    name: Peppol Network
    status: live (with EUSR/TSR reporting active)
    governing_body: OpenPeppol
    docs: https://docs.peppol.eu/edelivery/
    repos: [clear-peppol-ap]
    runbook: runbooks/regions/peppol/
    seed: rich
    cleartax_id: POP000602
    notes: "EUSR/TSR monthly reports due 15th of each month"

  gcc:
    name: GCC (Gulf Cooperation Council)
    countries: [SA, AE, BH, OM, QA, KW]
    status: oncall-driven
    repos: [einvoicing-core, e-invoicing-be]
    runbook: runbooks/regions/gcc/
    seed: rich
    notes: "Active code is mostly UAE+KSA but on-call comes for any GCC country"
